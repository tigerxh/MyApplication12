apply plugin: 'com.android.application'
apply plugin: 'org.greenrobot.greendao'
def getDate() {
    def date = new Date()
    def formattedDate = date.format('yyyyMMddHHmm')
    return formattedDate
}
def rename_and_moveout_apk(orignalFile) {
    def intoFile = "D:\\apache-tomcat-7.0.84\\webapps\\ROOT"+ File.separator + "apk"
    copy {
        from orignalFile
        into intoFile
        println "任务4复制apk到指定位置:" + intoFile
    }
}
android {
    compileSdkVersion 26
    defaultConfig {
        applicationId "vpn.tydic.com.myapplication"
        minSdkVersion 19
        targetSdkVersion 26
        versionCode 1
        versionName app_version
        testInstrumentationRunner "android.support.test.runner.AndroidJUnitRunner"
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    lintOptions {
        abortOnError false
    }

    flavorDimensions 'environment'
    productFlavors {
        product {
            dimension 'environment'
            buildConfigField "String", "url", '"http://q.scczc.net/app/"'
            buildConfigField "String", "QrCodePrefix", '"http://q.scczc.net/"'
        }

        site_test {
            dimension 'environment'
            buildConfigField "String", "url", '"http://10.88.0.214:8081/wx/app/"'
            buildConfigField "String", "QrCodePrefix", '""'
        }

        local_test {
            dimension 'environment'
            buildConfigField "String", "url", '"http://10.88.101.64:8081/wx/app/"'
            buildConfigField "String", "QrCodePrefix", '""'
        }
    }
    //修改生成的apk名字
//定义一个装apk文件路径的数组
    def fileArray = []
    android.applicationVariants.all { variant ->
        variant.outputs.all { output ->
            def outputFile = output.outputFile
            if (outputFile != null && outputFile.name.contains('release')) {
                //获取每个打包产物
                def variantProd = variant.productFlavors[0]
                def fileName = "app_${variantProd.name}_v"+app_version+".apk"
                println "自定义输出apk的名字:" + fileName;
                outputFileName = fileName;
                println "输出apk地址:" + outputFile.parentFile.absolutePath + java.io.File.separator + fileName
                fileArray.add(outputFile.parentFile.absolutePath + java.io.File.separator + fileName);
            }

        }
    }
    build {
        doLast() {
            if(IS_JENKINS){
                println "任务1编译打包完成后需要复制apk的数:" + fileArray.size()
                forEachFile(fileArray)
            }
        }
    }
}
def forEachFile(fileArray) {
    fileArray.forEach { file ->
        //遍历进行文件操作
        println "任务3遍历apk文件"
        rename_and_moveout_apk(file)
    }
}
dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation 'com.android.support:appcompat-v7:26.0.0-beta1'
    implementation 'com.android.support.constraint:constraint-layout:1.0.2'
    testImplementation 'junit:junit:4.12'
    androidTestImplementation 'com.android.support.test:runner:0.5'
    androidTestImplementation 'com.android.support.test.espresso:espresso-core:2.2.2'

    compile 'com.android.support:multidex:1.0.2'
    compile 'com.squareup.retrofit2:retrofit:2.1.0'
    compile 'com.squareup.retrofit2:converter-gson:2.1.0'
    compile 'io.reactivex:rxandroid:1.2.1'
    compile 'com.squareup.retrofit2:adapter-rxjava:2.1.0'

    //    compile 'com.squareup.okhttp3:okhttp:3.4.1'
    compile 'com.squareup.okhttp3:logging-interceptor:3.4.1'
    compile 'com.github.hotchemi:permissionsdispatcher:2.3.2'
    //    compile 'cn.yipianfengye.android:zxing-library:2.2'
    annotationProcessor 'com.github.hotchemi:permissionsdispatcher-processor:2.3.2'

    compile 'com.facebook.stetho:stetho:1.5.0'
    compile 'com.facebook.stetho:stetho-okhttp3:1.5.0'
    compile 'com.jakewharton:butterknife:8.6.0'
    annotationProcessor 'com.jakewharton:butterknife-compiler:8.6.0'

    compile 'com.rabbitmq:amqp-client:4.4.1'

    compile 'org.greenrobot:greendao:3.2.0'
}
